<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kristály Party Rádió</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        @keyframes gradient-xy { 0%, 100% { background-size: 400% 400%; background-position: left center; } 50% { background-size: 200% 200%; background-position: right center; } }
        .animate-gradient-xy { animation: gradient-xy 15s ease infinite; }
        @keyframes vipAnim { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        /* Rang színek */
        .rank-creator { color: #ff4d4d; font-weight: 900; text-shadow: 0 0 10px rgba(255,0,0,0.5); }
        .rank-admin { color: #ffaa00; font-weight: 800; }
        .rank-vip { color: #00f2ff; font-weight: 700; }
        
        /* Buborék stílusok */
        .bubble-creator { background: linear-gradient(90deg, #4b0000, #990000); border: 1px solid #ff4d4d; animation: vipAnim 3s infinite; background-size: 200%; }
        .bubble-admin { background: #2d1f00; border: 1px solid #ffaa00; }
        .bubble-vip { background: #001a1d; border: 1px solid #00f2ff; }

        /* Mobil Drawer */
        #users-sidebar-container { transition: transform 0.3s ease; }
        .mobile-sidebar-open { transform: translateX(0) !important; display: flex !important; background: #0f172a !important; box-shadow: -5px 0 20px rgba(0,0,0,0.8); }
        
        #modal-overlay { backdrop-filter: blur(5px); transition: opacity 0.3s; }
    </style>
</head>
<body class="min-h-screen bg-gray-900 text-white font-sans flex flex-col overflow-x-hidden">
    
    <div class="fixed inset-0 z-0 bg-gradient-to-br from-gray-900 via-blue-900 to-purple-900 animate-gradient-xy opacity-80"></div>

    <!-- MODAL: Profil Szerkesztő -->
    <div id="profile-modal" class="fixed inset-0 z-[100] flex items-center justify-center hidden">
        <div id="modal-overlay" class="absolute inset-0 bg-black/70"></div>
        <div class="relative bg-gray-800 border border-gray-700 p-6 rounded-3xl w-80 shadow-2xl">
            <h3 class="text-xl font-bold mb-4 text-center">Profil Szerkesztése</h3>
            <div class="flex flex-col items-center gap-4">
                <div class="relative group">
                    <img id="edit-avatar" src="" class="w-20 h-20 rounded-full bg-gray-700 border-2 border-cyan-500">
                    <button onclick="randomAvatar()" class="absolute -bottom-1 -right-1 bg-cyan-500 p-1.5 rounded-full hover:scale-110 transition">🔄</button>
                </div>
                <div class="w-full">
                    <label class="text-xs text-gray-400 ml-1">Megjelenítő név</label>
                    <input type="text" id="edit-displayname" class="w-full bg-gray-900 border border-gray-600 p-2 rounded-xl focus:outline-none focus:border-cyan-500">
                </div>
                <div class="flex gap-2 w-full mt-2">
                    <button onclick="closeModal()" class="flex-1 bg-gray-700 py-2 rounded-xl text-sm">Mégse</button>
                    <button onclick="saveProfile()" class="flex-1 bg-cyan-600 py-2 rounded-xl text-sm font-bold">Mentés</button>
                </div>
            </div>
        </div>
    </div>

    <main class="relative z-10 flex-grow flex flex-col lg:flex-row p-4 gap-6 max-w-7xl mx-auto w-full">
        <!-- Bal oszlop: Rádió -->
        <div class="w-full lg:w-4/12 flex flex-col gap-4">
            <div class="bg-gray-800/80 backdrop-blur-md p-6 rounded-3xl border border-gray-700 shadow-xl flex flex-col items-center">
                <div class="w-24 h-24 rounded-full bg-gradient-to-tr from-cyan-500 to-purple-600 flex items-center justify-center mb-4 shadow-lg animate-pulse">🎵</div>
                <audio id="radio-stream" src="https://radio-server-autodj.onrender.com/radio.mp3"></audio>
                <button id="play-btn" class="bg-white text-black px-8 py-2 rounded-full font-bold hover:scale-105 transition">LEJÁTSZÁS</button>
            </div>
        </div>

        <!-- Chat Szekció -->
        <div class="w-full lg:w-8/12 flex flex-col h-[600px] bg-gray-800/50 backdrop-blur-xl border border-gray-700 rounded-[2.5rem] overflow-hidden relative">
            <div class="p-4 border-b border-gray-700 flex justify-between items-center bg-gray-900/40">
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 rounded-full bg-green-500 animate-pulse"></div>
                    <span class="font-bold">Party Chat</span>
                </div>
                <button id="toggle-users" class="lg:hidden bg-gray-700 px-4 py-1 rounded-full text-xs font-bold">👥 Tagok <span id="user-count">0</span></button>
            </div>

            <div class="flex flex-grow overflow-hidden">
                <!-- Üzenetek -->
                <div id="msg-container" class="flex-grow p-4 overflow-y-auto custom-scroll flex flex-col gap-3"></div>

                <!-- Taglista (Desktopon látszik, mobilon drawer) -->
                <div id="users-sidebar-container" class="absolute inset-y-0 right-0 w-64 translate-x-full lg:translate-x-0 lg:static lg:block bg-gray-900/80 border-l border-gray-700 z-50">
                    <div class="p-4 font-bold border-b border-gray-700 flex justify-between">
                        Online Tagok
                        <button id="close-users" class="lg:hidden">✕</button>
                    </div>
                    <div id="user-list" class="p-2 flex flex-col gap-2 overflow-y-auto h-full"></div>
                </div>
            </div>

            <!-- Login / Bemenet -->
            <div id="bottom-bar" class="p-4 bg-gray-900/60 border-t border-gray-700">
                <div id="auth-box" class="flex flex-col gap-2">
                    <input type="text" id="login-user" placeholder="Felhasználónév" class="bg-gray-800 border border-gray-700 p-2 rounded-xl text-sm outline-none focus:border-cyan-500">
                    <input type="password" id="login-pass" placeholder="Jelszó (VIP-nek)" class="bg-gray-800 border border-gray-700 p-2 rounded-xl text-sm outline-none focus:border-cyan-500">
                    <div class="flex gap-2">
                        <button onclick="login(true)" class="flex-1 bg-gray-700 py-2 rounded-xl text-xs">Vendég</button>
                        <button onclick="login(false)" class="flex-1 bg-cyan-600 py-2 rounded-xl text-xs font-bold">Belépés / Reg.</button>
                    </div>
                </div>
                <div id="chat-box" class="hidden flex gap-2">
                    <input type="text" id="msg-input" placeholder="Írj egy üzenetet..." class="flex-grow bg-gray-800 border border-gray-700 px-4 py-2 rounded-2xl outline-none">
                    <button id="send-btn" class="bg-cyan-600 p-2 rounded-xl">➤</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const socket = io();
        let myUser = null;
        let tempAvatarSeed = "";

        // UI Elemek
        const msgContainer = document.getElementById('msg-container');
        const userList = document.getElementById('user-list');
        const sidebar = document.getElementById('users-sidebar-container');

        // Funkciók
        function login(isGuest) {
            const user = document.getElementById('login-user').value;
            const pass = document.getElementById('login-pass').value;
            socket.emit('login', { username: user, password: pass, isGuest }, (res) => {
                if(res.success) {
                    myUser = res.user;
                    document.getElementById('auth-box').classList.add('hidden');
                    document.getElementById('chat-box').classList.remove('hidden');
                } else { alert(res.error); }
            });
        }

        socket.on('newMessage', (msg) => {
            const div = document.createElement('div');
            const isMe = myUser && msg.senderUniqueId === myUser.uniqueId;
            const rankClass = `rank-${msg.rank}`;
            const bubbleClass = msg.isSystem ? 'bg-yellow-500/10 text-yellow-200 border border-yellow-500/20 text-center py-1 rounded-full text-xs' : `bubble-${msg.rank} p-3 rounded-2xl max-w-[85%]`;
            
            div.className = `flex flex-col ${isMe ? 'items-end' : 'items-start'} w-full`;
            div.innerHTML = msg.isSystem ? `<p class="w-full">${msg.senderDisplayName} ${msg.text}</p>` : `
                <div class="flex items-center gap-1 text-[10px] mb-1 ${isMe ? 'flex-row-reverse' : ''}">
                    <span class="${rankClass}">${msg.senderDisplayName}</span>
                    <span class="text-gray-500">#${msg.senderUniqueId}</span>
                </div>
                <div class="${bubbleClass} shadow-lg text-sm">${msg.text}</div>
            `;
            msgContainer.appendChild(div);
            msgContainer.scrollTop = msgContainer.scrollHeight;
        });

        socket.on('updateUsers', (users) => {
            userList.innerHTML = '';
            document.getElementById('user-count').innerText = users.length;
            
            // "Te" szekció
            if(myUser) {
                const me = users.find(u => u.uniqueId === myUser.uniqueId);
                if(me) {
                    const meDiv = document.createElement('div');
                    meDiv.className = "p-3 bg-cyan-500/10 border-2 border-cyan-500/50 rounded-2xl flex items-center gap-3 mb-4 cursor-pointer hover:scale-[1.02] transition";
                    meDiv.onclick = openProfileModal;
                    meDiv.innerHTML = `
                        <img src="https://api.dicebear.com/7.x/adventurer/svg?seed=${me.avatarSeed}" class="w-10 h-10 rounded-full bg-gray-800">
                        <div class="flex flex-col">
                            <span class="font-bold text-sm">TE (Szerkesztés ✏️)</span>
                            <span class="text-xs rank-${me.rank}">${me.displayName}</span>
                        </div>
                    `;
                    userList.appendChild(meDiv);
                    const hr = document.createElement('div');
                    hr.className = "h-px bg-gray-700 my-2";
                    userList.appendChild(hr);
                }
            }

            users.forEach(u => {
                if(myUser && u.uniqueId === myUser.uniqueId) return;
                const div = document.createElement('div');
                div.className = "flex items-center gap-3 p-2 hover:bg-white/5 rounded-xl transition";
                div.innerHTML = `
                    <img src="https://api.dicebear.com/7.x/adventurer/svg?seed=${u.avatarSeed}" class="w-8 h-8 rounded-full bg-gray-800">
                    <div class="flex flex-col">
                        <span class="text-sm font-medium rank-${u.rank}">${u.displayName}</span>
                        <span class="text-[9px] text-gray-500">#${u.uniqueId}</span>
                    </div>
                `;
                userList.appendChild(div);
            });
        });

        // MODAL LOGIKA
        function openProfileModal() {
            if(myUser.rank === 'guest') return alert("Vendégként nem szerkesztheted a profilt!");
            document.getElementById('profile-modal').classList.remove('hidden');
            document.getElementById('edit-displayname').value = myUser.displayName;
            tempAvatarSeed = myUser.avatarSeed;
            updateModalAvatar();
        }
        function closeModal() { document.getElementById('profile-modal').classList.add('hidden'); }
        function randomAvatar() { tempAvatarSeed = Math.random().toString(36).substring(7); updateModalAvatar(); }
        function updateModalAvatar() { document.getElementById('edit-avatar').src = `https://api.dicebear.com/7.x/adventurer/svg?seed=${tempAvatarSeed}`; }
        
        function saveProfile() {
            const newName = document.getElementById('edit-displayname').value;
            socket.emit('updateProfile', { displayName: newName, avatarSeed: tempAvatarSeed });
            myUser.displayName = newName;
            myUser.avatarSeed = tempAvatarSeed;
            closeModal();
        }

        // UI Események
        document.getElementById('toggle-users').onclick = () => sidebar.classList.add('mobile-sidebar-open');
        document.getElementById('close-users').onclick = () => sidebar.classList.remove('mobile-sidebar-open');
        document.getElementById('send-btn').onclick = () => {
            const input = document.getElementById('msg-input');
            if(input.value) {
                if(input.value === '/clear') { msgContainer.innerHTML = ''; }
                else { socket.emit('sendMessage', input.value); }
                input.value = '';
            }
        };
        document.getElementById('msg-input').onkeypress = (e) => { if(e.key === 'Enter') document.getElementById('send-btn').click(); };

        // Rádió
        const playBtn = document.getElementById('play-btn');
        const audio = document.getElementById('radio-stream');
        playBtn.onclick = () => {
            if(audio.paused) { audio.play(); playBtn.innerText = 'SZÜNET'; }
            else { audio.pause(); playBtn.innerText = 'LEJÁTSZÁS'; }
        };
    </script>
</body>
</html>
